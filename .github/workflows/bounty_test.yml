name: Bounty Verification
on: [push]

jobs:
  check-speed:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pytest pytest-xdist numpy casadi

      - name: Verify Collection Speed
        run: |
          echo "=== STARTING SPEED TEST ==="
          time pytest --collect-only
