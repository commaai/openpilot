name: tests

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      run_number:
        default: '1'
        required: true
        type: string

concurrency:
  # include the head repo so same-named branches from different forks don't cancel each other's runs
  group: tests-ci-run-${{ inputs.run_number }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && github.run_id || github.head_ref || github.ref }}-${{ github.workflow }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  CI: 1
  PYTHONPATH: ${{ github.workspace }}
  PYTEST: pytest --continue-on-collection-errors --durations=0 -n logical

jobs:
  build_release:
    name: build release
    runs-on: ${{
      (github.repository == 'commaai/openpilot') &&
      ((github.event_name != 'pull_request') ||
      (github.event.pull_request.head.repo.full_name == 'commaai/openpilot'))
      && fromJSON('["namespace-profile-amd64-8x16"]')
      || fromJSON('["ubuntu-24.04"]') }}
    env:
      STRIPPED_DIR: /tmp/releasepilot
      PYTHONPATH: /tmp/releasepilot
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: true
    - name: Getting LFS files
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60
      with:
        timeout_minutes: 2
        max_attempts: 3
        command: git lfs pull
    - name: Build devel
      # the free ubuntu runners used for fork PRs need more than a minute
      timeout-minutes: 3
      run: TARGET_DIR=$STRIPPED_DIR tools/release/build_stripped.sh
    - run: ./tools/op.sh setup
    - name: Build openpilot and run checks
      timeout-minutes: 30
      working-directory: ${{ env.STRIPPED_DIR }}
      run: python3 openpilot/system/manager/build.py
    - name: Run tests
      timeout-minutes: 1
      working-directory: ${{ env.STRIPPED_DIR }}
      run: tools/release/check-dirty.sh
    - name: Check submodules
      if: github.repository == 'commaai/openpilot'
      timeout-minutes: 3
      run: tools/release/check-submodules.sh

  build_mac:
    name: build macOS
    runs-on: ${{ ((github.repository == 'commaai/openpilot') && ((github.event_name != 'pull_request') || (github.event.pull_request.head.repo.full_name == 'commaai/openpilot'))) && 'namespace-profile-macos-8x14' || 'macos-latest' }}
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: true
    - name: Remove Homebrew from environment
      run: |
        FILTERED=$(echo "$PATH" | tr ':' '\n' | grep -v '/opt/homebrew' | tr '\n' ':')
        echo "PATH=${FILTERED}/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin" >> $GITHUB_ENV
    - run: ./tools/op.sh setup
    - name: Building openpilot
      run: scons

  static_analysis:
    name: static analysis
    runs-on: ${{
      (github.repository == 'commaai/openpilot') &&
      ((github.event_name != 'pull_request') ||
      (github.event.pull_request.head.repo.full_name == 'commaai/openpilot'))
      && fromJSON('["namespace-profile-amd64-8x16"]')
      || fromJSON('["ubuntu-24.04"]') }}
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: true
    - run: ./tools/op.sh setup
    - name: Static analysis
      timeout-minutes: 1
      run: scripts/lint/lint.sh

  unit_tests:
    name: unit tests
    runs-on: ${{
      (github.repository == 'commaai/openpilot') &&
      ((github.event_name != 'pull_request') ||
      (github.event.pull_request.head.repo.full_name == 'commaai/openpilot'))
      && fromJSON('["namespace-profile-amd64-8x16"]')
      || fromJSON('["ubuntu-24.04"]') }}
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: true
    - run: ./tools/op.sh setup
    - name: Build openpilot
      run: scons
    - name: Run unit tests
      timeout-minutes: ${{ contains(runner.name, 'nsc') && 2 || 20 }}
      run: |
        source openpilot/selfdrive/test/setup_xvfb.sh
        # Pre-compile Python bytecode so each pytest worker doesn't need to
        $PYTEST --collect-only -m 'not slow' -qq
        MAX_EXAMPLES=1 $PYTEST -m 'not slow'

  process_replay:
    name: process replay
    runs-on: ${{
      (github.repository == 'commaai/openpilot') &&
      ((github.event_name != 'pull_request') ||
      (github.event.pull_request.head.repo.full_name == 'commaai/openpilot'))
      && fromJSON('["namespace-profile-amd64-8x16"]')
      || fromJSON('["ubuntu-24.04"]') }}
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: true
    - run: ./tools/op.sh setup
    - name: Build openpilot
      run: scons
    - name: Run replay
      timeout-minutes: ${{ contains(runner.name, 'nsc') && 2 || 20 }}
      continue-on-error: ${{ github.ref == 'refs/heads/master' }}
      run: openpilot/selfdrive/test/process_replay/test_processes.py -j$(nproc)
    - name: Print diff
      id: print-diff
      if: always()
      run: cat openpilot/selfdrive/test/process_replay/diff.txt
    - name: Print diff report
      if: always()
      run: cat openpilot/selfdrive/test/process_replay/diff_report.txt
    - uses: actions/upload-artifact@v7
      if: always()
      continue-on-error: true
      with:
        name: process_replay_diff.txt
        path: openpilot/selfdrive/test/process_replay/diff.txt
    - name: Upload diff report
      uses: actions/upload-artifact@v7
      if: always() && github.event_name == 'pull_request'
      continue-on-error: true
      with:
        name: diff_report_${{ github.event.number }}
        path: openpilot/selfdrive/test/process_replay/diff_report.txt
    - name: Checkout ci-artifacts
      if: github.repository == 'commaai/openpilot' && github.ref == 'refs/heads/master'
      uses: actions/checkout@v7
      with:
        repository: commaai/ci-artifacts
        ssh-key: ${{ secrets.CI_ARTIFACTS_DEPLOY_KEY }}
        path: ${{ github.workspace }}/ci-artifacts
    - name: Prepare refs
      if: github.repository == 'commaai/openpilot' && github.ref == 'refs/heads/master'
      working-directory: ${{ github.workspace }}/ci-artifacts
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "<>"
        git fetch origin process-replay || true
        git checkout process-replay 2>/dev/null || git checkout --orphan process-replay
        cp ${{ github.workspace }}/openpilot/selfdrive/test/process_replay/fakedata/*.zst .
        echo "${{ github.sha }}" > ref_commit
        git add .
        git commit -m "process-replay refs for ${{ github.repository }}@${{ github.sha }}" || echo "No changes to commit"
    - name: Push refs
      if: github.repository == 'commaai/openpilot' && github.ref == 'refs/heads/master'
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60
      with:
        timeout_minutes: 2
        max_attempts: 3
        command: cd ${{ github.workspace }}/ci-artifacts && git push origin process-replay --force
    - name: Run regen
      if: false
      timeout-minutes: 4
      env:
        ONNXCPU: 1
      run: $PYTEST openpilot/selfdrive/test/process_replay/test_regen.py

  simulator_driving:
    name: simulator driving
    runs-on: ${{
      (github.repository == 'commaai/openpilot') &&
      ((github.event_name != 'pull_request') ||
      (github.event.pull_request.head.repo.full_name == 'commaai/openpilot'))
      && fromJSON('["namespace-profile-amd64-8x16"]')
      || fromJSON('["ubuntu-24.04"]') }}
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: true
    - run: ./tools/op.sh setup
    - name: Build openpilot
      run: scons
    - name: Install MetaDrive
      run: uv pip install "metadrive-simulator @ git+https://github.com/commaai/metadrive.git@minimal"
    - name: Driving test
      timeout-minutes: 20
      env:
        PYTHONFAULTHANDLER: 1
        METADRIVE_RENDER_SCALE: "0.5"
        METADRIVE_NO_MSAA: "1"
        METADRIVE_SIMPLE_RENDER: "1"
        METADRIVE_NO_SHADOWS: "1"
        METADRIVE_FLAT_TERRAIN_CARD: "1"
      run: |
        source openpilot/selfdrive/test/setup_xvfb.sh
        python3 -m metadrive.pull_asset || true
        SIM_LOGS=1 SIM_LOGS_DIR="$GITHUB_WORKSPACE/sim_logs" pytest -n0 -s openpilot/tools/sim/tests/test_metadrive_bridge.py
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: sim-driving-logs
        path: |
          sim_logs/**
          !sim_logs/**/fcamera.hevc
        if-no-files-found: warn

  create_ui_report:
    name: Create UI Report
    runs-on: ${{
      (github.repository == 'commaai/openpilot') &&
      ((github.event_name != 'pull_request') ||
      (github.event.pull_request.head.repo.full_name == 'commaai/openpilot'))
      && fromJSON('["namespace-profile-amd64-8x16"]')
      || fromJSON('["ubuntu-24.04"]') }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - run: ./tools/op.sh setup
      - name: Build openpilot
        run: scons
      - name: Create UI Report
        run: |
          source openpilot/selfdrive/test/setup_xvfb.sh
          python3 openpilot/selfdrive/ui/tests/diff/replay.py
          python3 openpilot/selfdrive/ui/tests/diff/replay.py --big
      - name: Upload UI Report
        uses: actions/upload-artifact@v7
        with:
          name: ui-report-${{ inputs.run_number || '1' }}-${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && 'master' || github.event.number }}
          path: openpilot/selfdrive/ui/tests/diff/report
