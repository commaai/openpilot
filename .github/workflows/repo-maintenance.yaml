name: repo maintenance

on:
  schedule:
    - cron: "0 14 * * 1" # every Monday at 2am UTC (6am PST)
  pull_request:
    types: [closed]
  workflow_dispatch:

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  package_updates:
    name: package_updates
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'commaai/openpilot' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: true
    - run: ./tools/op.sh setup
    - name: uv lock
      run: uv lock --upgrade
    - name: uv pip tree
      id: pip_tree
      run: |
        echo 'PIP_TREE<<EOF' >> $GITHUB_OUTPUT
        uv pip tree >> $GITHUB_OUTPUT
        echo 'EOF' >> $GITHUB_OUTPUT
    - name: venv size
      id: venv_size
      run: |
        echo 'VENV_SIZE<<EOF' >> $GITHUB_OUTPUT
        echo "Total: $(du -sh .venv | cut -f1)" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "Top 10 by size:" >> $GITHUB_OUTPUT
        du -sh .venv/lib/python*/site-packages/* 2>/dev/null \
          | grep -v '\.dist-info' \
          | grep -v '__pycache__' \
          | sort -rh \
          | head -10 \
          | while IFS=$'\t' read size path; do echo "$size  ${path##*/}"; done >> $GITHUB_OUTPUT
        echo 'EOF' >> $GITHUB_OUTPUT
    - name: bump submodules
      run: |
        git submodule update --remote
        git add .
    - name: update car docs
      run: |
        python openpilot/selfdrive/car/docs.py
        git add docs/CARS.md
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
      with:
        author: Vehicle Researcher <user@comma.ai>
        token: ${{ secrets.ACTIONS_CREATE_PR_PAT }}
        commit-message: Update Python packages
        title: '[bot] Update Python packages'
        branch: auto-package-updates
        base: master
        delete-branch: true
        body: |
          Automatic PR from repo-maintenance -> package_updates

          ```
          $ du -sh .venv && du -sh .venv/lib/python*/site-packages/* | sort -rh | head -10
          ${{ steps.venv_size.outputs.VENV_SIZE }}
          ```

          ```
          $ uv pip tree
          ${{ steps.pip_tree.outputs.PIP_TREE }}
          ```
        labels: bot

  cleanup_merged_branches:
    name: cleanup merged branches
    if: github.repository == 'commaai/openpilot'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Delete branches for merged PRs
        uses: actions/github-script@v9
        with:
          script: |
            const days = 180;
            const since = new Date(Date.now() - days * 24 * 60 * 60 * 1000)
              .toISOString()
              .slice(0, 10);
            const query = `repo:${context.repo.owner}/${context.repo.repo} is:pr is:merged merged:>=${since}`;
            let deleted = 0;
            let skipped = 0;

            for await (const response of github.paginate.iterator(github.rest.search.issuesAndPullRequests, {
              q: query,
              per_page: 100,
            })) {
              for (const item of response.data.items) {
                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: item.number,
                });

                const branch = pr.head.ref;
                const isFork = pr.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`;
                if (isFork) {
                  skipped++;
                  continue;
                }

                try {
                  await github.rest.git.deleteRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `heads/${branch}`,
                  });
                  console.log(`Deleted branch ${branch} (PR #${pr.number})`);
                  deleted++;
                } catch (error) {
                  if (error.status === 422 || error.status === 403) {
                    console.log(`Skipping branch ${branch} (PR #${pr.number}): ${error.message}`);
                    skipped++;
                    continue;
                  }
                  throw error;
                }
              }
            }

            console.log(`Done. Deleted ${deleted} branches, skipped ${skipped}.`);
