name: asius prebuilt

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: [self-hosted, linux, arm64]
    env:
      BUILD_DIR: /data/openpilot
      SCONS_CACHE: /data/scons_cache
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: false

      - name: Fetch LFS files from upstream
        run: |
          # Skip our LFS (over budget), fetch from upstream commaai instead
          git remote add upstream https://github.com/commaai/openpilot.git || true
          git lfs fetch upstream
          git lfs checkout

      - name: Setup Python environment
        run: |
          uv sync
          echo "VIRTUAL_ENV=$(pwd)/.venv" >> $GITHUB_ENV
          echo "$(pwd)/.venv/bin" >> $GITHUB_PATH

      - name: Clean build directory
        run: |
          sudo rm -rf $BUILD_DIR/*
          mkdir -p $BUILD_DIR $SCONS_CACHE

      - name: Copy source to build directory
        run: rsync -rl --exclude='.git' . $BUILD_DIR/

      - name: Build openpilot
        run: |
          cd $BUILD_DIR
          export PYTHONPATH=$BUILD_DIR
          scons -j$(nproc) cache_dir=$SCONS_CACHE --minimal
          touch prebuilt

      - name: Prepare release
        run: |
          cd $BUILD_DIR
          # Bundle required system libraries that differ from AGNOS
          mkdir -p third_party/lib
          cp /usr/lib/aarch64-linux-gnu/libcapnp*.so* third_party/lib/ || true
          cp /usr/lib/aarch64-linux-gnu/libkj*.so* third_party/lib/ || true

          # Add bundled libs to library path in launch_env.sh
          echo 'export LD_LIBRARY_PATH="$DIR/third_party/lib:$LD_LIBRARY_PATH"' >> launch_env.sh

          # Remove build artifacts and source files not needed at runtime
          find . -name '*.o' -delete
          find . -name '*.a' -delete
          find . -name '*.os' -delete
          find . -name '.sconsign.dblite' -delete
          find . -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null || true
          rm -rf .git .github SConstruct SConscript release third_party/*x86* third_party/*Darwin*

      - name: Publish to master-ci
        run: |
          cd $BUILD_DIR
          git init
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git lfs uninstall || true
          rm -f .gitattributes
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git fetch origin master-ci || true
          git add -f .

          VERSION="$(date '+%Y.%m.%d')-${{ github.run_number }}"
          git commit -m "asius openpilot v${VERSION}

          date: $(date '+%Y-%m-%dT%H:%M:%S')
          master commit: ${{ github.sha }}
          "

          git branch -M master-ci
          GIT_LFS_SKIP_PUSH=1 git push -f origin master-ci
