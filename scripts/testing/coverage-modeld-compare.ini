# Used only by scripts/testing/compare_coverage.sh (pytest --cov-config=...).
#
# - Omit ``selfdrive/modeld/tests/`` so test modules are not traced as product
#   code. With pytest's default ``-n auto``, combine pytest-cov with ``-n 0`` in
#   the script so a single worker data file is produced (avoids stray test paths
#   in HTML/XML).
# - Omit ``modeld.py`` and ``dmonitoringmodeld.py`` here: they are not executed
#   in the pytest process (subprocess daemons). Excluding them raises the
#   reported % toward meaningful library coverage without claiming those files
#   are unit-tested.
#
# For subprocess coverage of ``modeld.py``, use a dedicated ``coverage run``
# profile; keep this script focused on parser/fill/metadata.

[run]
omit =
    */selfdrive/modeld/tests/*
    */openpilot/selfdrive/modeld/tests/*
    selfdrive/modeld/modeld.py
    selfdrive/modeld/dmonitoringmodeld.py

[report]
omit =
    */selfdrive/modeld/tests/*
    */openpilot/selfdrive/modeld/tests/*
    selfdrive/modeld/modeld.py
    selfdrive/modeld/dmonitoringmodeld.py
